<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roboot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --accent2: #533483;
  --text: #eee;
  --text-dim: #888;
  --user-bg: #0f3460;
  --bot-bg: #222244;
  --radius: 16px;
}

body {
  font-family: -apple-system, "PingFang SC", "SF Pro", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.header .avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header .info h1 { font-size: 15px; font-weight: 600; }
.header .info .status {
  font-size: 12px;
  color: var(--text-dim);
}
.header .info .status::before {
  content: "";
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4caf50;
  margin-right: 5px;
  vertical-align: middle;
}

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: var(--radius);
  line-height: 1.6;
  font-size: 14px;
  word-break: break-word;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  background: var(--user-bg);
  border-bottom-right-radius: 4px;
}

.msg.bot {
  align-self: flex-start;
  background: var(--bot-bg);
  border-bottom-left-radius: 4px;
}

.msg.bot .tools-badge {
  display: inline-block;
  font-size: 11px;
  color: var(--accent);
  background: rgba(233, 69, 96, 0.1);
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
}

.msg.thinking {
  align-self: flex-start;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  padding: 8px 0;
}

.msg.thinking .dots::after {
  content: "";
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%   { content: ""; }
  25%  { content: "."; }
  50%  { content: ".."; }
  75%  { content: "..."; }
}

.msg pre {
  background: rgba(0,0,0,0.3);
  padding: 8px 10px;
  border-radius: 8px;
  margin-top: 6px;
  overflow-x: auto;
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
}

.msg code {
  background: rgba(0,0,0,0.2);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
}

/* Input */
.input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s;
}

.input-area textarea:focus {
  border-color: var(--accent);
}

.input-area textarea::placeholder { color: var(--text-dim); }

.input-area button {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}

.input-area button:hover { opacity: 0.9; }
.input-area button:active { transform: scale(0.95); }
.input-area button:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">R</div>
  <div class="info">
    <h1>Roboot</h1>
    <div class="status" id="status">在线</div>
  </div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="说点什么..." autofocus></textarea>
  <button id="send" onclick="sendMessage()">&#8593;</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
let ws = null;
let thinkingEl = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    statusEl.textContent = '在线';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    removeThinking();

    if (data.type === 'response') {
      addMessage('bot', data.content, data.tools_used);
      sendBtn.disabled = false;
    } else if (data.type === 'thinking') {
      showThinking();
    } else if (data.type === 'error') {
      addMessage('bot', '出错了: ' + data.content);
      sendBtn.disabled = false;
    }
  };

  ws.onclose = () => {
    statusEl.textContent = '已断开，重连中...';
    setTimeout(connect, 2000);
  };
}

function addMessage(role, text, toolsUsed) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = renderMarkdown(text || '');
  if (toolsUsed && toolsUsed > 0) {
    const badge = document.createElement('div');
    badge.className = 'tools-badge';
    badge.textContent = `${toolsUsed} tool call${toolsUsed > 1 ? 's' : ''}`;
    el.appendChild(badge);
  }
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showThinking() {
  if (thinkingEl) return;
  thinkingEl = document.createElement('div');
  thinkingEl.className = 'msg thinking';
  thinkingEl.innerHTML = '思考中<span class="dots"></span>';
  messagesEl.appendChild(thinkingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeThinking() {
  if (thinkingEl) {
    thinkingEl.remove();
    thinkingEl = null;
  }
}

function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addMessage('user', text);
  ws.send(JSON.stringify({ content: text }));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

connect();
</script>
</body>
</html>
