<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roboot — 会话</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --green: #4caf50;
  --text: #eee;
  --text-dim: #888;
  --radius: 12px;
}

body {
  font-family: -apple-system, "PingFang SC", "SF Pro", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.header .back {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  flex-shrink: 0;
}

.header .back:hover { background: rgba(255,255,255,0.1); }

.header .info { flex: 1; }
.header .info h1 { font-size: 16px; font-weight: 600; }
.header .info .meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.header .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.header .actions {
  display: flex;
  gap: 8px;
}

.header .actions button {
  padding: 6px 14px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  background: var(--surface2);
  color: var(--text);
}

.header .actions button:hover { background: rgba(255,255,255,0.1); }
.header .actions button.active { background: var(--accent); color: white; }

/* Terminal output */
.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  font-family: "SF Mono", "Menlo", "Cascadia Code", monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
  color: #c8d6e5;
  background: #0d1117;
}

.terminal::-webkit-scrollbar { width: 6px; }
.terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.terminal .loading-msg {
  color: var(--text-dim);
  font-family: -apple-system, "PingFang SC", sans-serif;
}

/* Input area */
.input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}

.input-area textarea {
  flex: 1;
  background: #0d1117;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: "SF Mono", "Menlo", monospace;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
}

.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-dim); }

.input-area button {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

.input-area button:hover { opacity: 0.9; }
.input-area button:disabled { opacity: 0.3; }

.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--green);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 10;
}

.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <a href="/dashboard" class="back">←</a>
  <span class="status-dot"></span>
  <div class="info">
    <h1 id="project-name">加载中...</h1>
    <div class="meta" id="session-meta"></div>
  </div>
  <div class="actions">
    <button onclick="refresh()" id="refresh-btn">刷新</button>
    <button onclick="toggleAutoRefresh()" id="auto-btn">自动刷新</button>
  </div>
</div>

<div class="terminal" id="terminal">
  <span class="loading-msg">读取中...</span>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="输入消息发送到这个 Claude Code 会话..."></textarea>
  <button id="send-btn" onclick="send()">↑</button>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const project = params.get('project') || '';
const pid = params.get('pid') || '';
const cwd = params.get('cwd') || '';

document.getElementById('project-name').textContent = project;
document.getElementById('session-meta').textContent = `PID ${pid} · ${cwd}`;
document.title = `${project} — Roboot`;

const terminal = document.getElementById('terminal');
const inputEl = document.getElementById('input');
let autoRefresh = false;
let autoTimer = null;

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '刷新中...';
  try {
    const resp = await fetch(`/api/sessions/${encodeURIComponent(project)}/read`);
    const data = await resp.json();
    terminal.textContent = data.content || '(空)';
    terminal.scrollTop = terminal.scrollHeight;
  } catch (e) {
    terminal.textContent = `读取失败: ${e.message}`;
  }
  btn.textContent = '刷新';
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('auto-btn');
  if (autoRefresh) {
    btn.classList.add('active');
    btn.textContent = '自动刷新 ✓';
    autoTimer = setInterval(refresh, 5000);
  } else {
    btn.classList.remove('active');
    btn.textContent = '自动刷新';
    clearInterval(autoTimer);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  inputEl.value = '';

  try {
    const resp = await fetch(`/api/sessions/${encodeURIComponent(project)}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    showToast(data.result || '已发送');
    // Auto refresh after sending
    setTimeout(refresh, 1500);
  } catch (e) {
    showToast(`发送失败: ${e.message}`);
  }
  btn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Initial load
refresh();
</script>
</body>
</html>
