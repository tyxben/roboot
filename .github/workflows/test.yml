name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v
