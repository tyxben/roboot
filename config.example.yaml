# Copy this file to config.yaml and fill in your API keys:
#   cp config.example.yaml config.yaml
#
# config.yaml is gitignored. Never commit real secrets.

# LLM provider API keys. At least one is required.
# Keys unused in config.yaml may be removed or left empty.
providers:
  deepseek: "sk-REPLACE_ME"          # https://platform.deepseek.com -- recommended, cheap and stable
  anthropic: "sk-ant-REPLACE_ME"     # https://console.anthropic.com -- Claude models
  zhipu: "REPLACE_ME"                # https://open.bigmodel.cn -- GLM / ChatGLM
  # openai: "sk-REPLACE_ME"          # https://platform.openai.com

# Default LLM used by the agent. Must match a key in `providers` above.
default_provider: "deepseek"
default_model: "deepseek-chat"

# Soft cap on daily spend in USD. Enforced by Arcana's budget tracker.
daily_budget_usd: 5.0

# Voice settings (used by CLI --voice mode and server TTS endpoint).
voice:
  # Edge TTS voice name. Leave empty for the default (zh-CN-YunxiNeural).
  # Examples: zh-CN-XiaoxiaoNeural, zh-CN-YunjianNeural, en-US-JennyNeural
  # List all voices: edge-tts --list-voices
  tts_voice: ""
  # Speech recognition language (used by CLI voice mode only).
  language: "zh-CN"

# Assistant name. Also editable through chat -- the assistant can rename itself
# by writing to soul.md via the `soul` tool.
name: "Roboot"

# Assistant personality / system prompt base. You can also edit soul.md directly;
# soul.md takes precedence when present.
personality: |
  You are Roboot, a personal AI assistant running on the user's Mac.

  Style: concise (1-3 sentences per reply), friendly, occasionally playful.

  Capabilities:
  - Run shell commands (the `shell` tool)
  - Manage multiple Claude Code sessions in iTerm2 (list, read, send)
  - Use the camera (`look`) and take screenshots (`screenshot`)
  - Remember facts about the user via the `soul` tool

  Principles:
  - Say "I'm not sure" when uncertain
  - Confirm before destructive actions
  - Proactively flag unusual state in Claude Code sessions

# Telegram bot (optional remote access).
telegram:
  # Bot token from @BotFather on Telegram. Leave empty to disable.
  bot_token: ""
  # Whitelist of Telegram user IDs allowed to talk to the bot.
  # Get your ID by messaging @userinfobot. Empty list = allow everyone (not recommended).
  allowed_users: []

# Relay-based remote access (optional).
# Lets you reach the web console from outside your LAN via a Cloudflare Worker relay.
# Traffic is end-to-end encrypted between daemon and browser (see SECURITY.md).
remote_access:
  # One of: "none" | "official_relay" | "custom_relay"
  method: "none"

  relay:
    # Enable connecting to the relay at startup.
    enabled: false
    # Relay endpoint (WebSocket URL).
    # Official relay (free, Cloudflare Workers):
    endpoint: "wss://relay.coordbound.com"
    # Or deploy your own: see relay/ directory and relay/wrangler.toml
    # endpoint: "wss://your-own-relay.example.com"
