# Copy this file to config.yaml and fill in your API keys:
#   cp config.example.yaml config.yaml
#
# config.yaml is gitignored. Never commit real secrets.

# LLM provider API keys. At least one is required.
# Keys unused in config.yaml may be removed or left empty.
providers:
  deepseek: "sk-REPLACE_ME"          # https://platform.deepseek.com -- recommended, cheap and stable
  anthropic: "sk-ant-REPLACE_ME"     # https://console.anthropic.com -- Claude models
  zhipu: "REPLACE_ME"                # https://open.bigmodel.cn -- GLM / ChatGLM
  # openai: "sk-REPLACE_ME"          # https://platform.openai.com

# Default LLM used by the agent. Must match a key in `providers` above.
default_provider: "deepseek"
default_model: "deepseek-chat"

# Soft cap on daily spend in USD. Enforced by Arcana's budget tracker.
daily_budget_usd: 5.0

# Voice settings (used by CLI --voice mode and server TTS endpoint).
voice:
  # Edge TTS voice name. Leave empty for the default (zh-CN-YunxiNeural).
  # Examples: zh-CN-XiaoxiaoNeural, zh-CN-YunjianNeural, en-US-JennyNeural
  # List all voices: edge-tts --list-voices
  tts_voice: ""
  # Speech recognition language (used by CLI voice mode only).
  language: "zh-CN"

  # Speech-to-text backend for voice input (Telegram voice messages, CLI --voice).
  # If this block is omitted, Roboot defaults to `mlx_whisper`.
  stt:
    # One of: "mlx_whisper" | "google" | "none"
    #   mlx_whisper -- Apple-Silicon native, offline after first download,
    #                  ~96% Chinese accuracy with large-v3 (~3 GB).
    #   google      -- speech_recognition against Google's free Web Speech
    #                  endpoint. Zero local RAM/disk, requires internet,
    #                  ~85-90% Chinese accuracy, rate-limited. Use on Intel
    #                  Macs or in low-RAM environments.
    #   none        -- Disable voice input entirely. Telegram replies
    #                  "STT disabled" when a voice message arrives.
    backend: "mlx_whisper"
    # mlx_whisper only. Trade accuracy for RAM/disk:
    #   whisper-large-v3-mlx  ~3 GB   ~96% zh  (default, best accuracy)
    #   whisper-medium-mlx    ~1.5 GB ~93% zh
    #   whisper-small-mlx     ~500 MB ~88% zh
    #   whisper-base-mlx      ~150 MB
    #   whisper-tiny-mlx      ~75 MB
    # Override ad-hoc with env var ROBOOT_WHISPER_MODEL.
    model: "whisper-large-v3-mlx"
    # Transcription language hint. Override ad-hoc with ROBOOT_WHISPER_LANGUAGE.
    language: "zh"

# Assistant name. Also editable through chat -- the assistant can rename itself
# by writing to soul.md via the `soul` tool.
name: "Roboot"

# Assistant personality / system prompt base. You can also edit soul.md directly;
# soul.md takes precedence when present.
personality: |
  You are Roboot, a personal AI assistant running on the user's Mac.

  Style: concise (1-3 sentences per reply), friendly, occasionally playful.

  Capabilities:
  - Run shell commands (the `shell` tool)
  - Manage multiple Claude Code sessions in iTerm2 (list, read, send)
  - Use the camera (`look`) and take screenshots (`screenshot`)
  - Remember facts about the user via the `soul` tool

  Principles:
  - Say "I'm not sure" when uncertain
  - Confirm before destructive actions
  - Proactively flag unusual state in Claude Code sessions

# Telegram bot (optional remote access).
telegram:
  # Bot token from @BotFather on Telegram. Leave empty to disable.
  bot_token: ""
  # Whitelist of Telegram user IDs allowed to talk to the bot.
  # Get your ID by messaging @userinfobot. Empty list = allow everyone (not recommended).
  allowed_users: []

# Relay-based remote access (optional).
# Lets you reach the web console from outside your LAN via a Cloudflare Worker relay.
# Traffic is end-to-end encrypted between daemon and browser (see SECURITY.md).
remote_access:
  # One of: "none" | "official_relay" | "custom_relay"
  method: "none"

  relay:
    # Enable connecting to the relay at startup.
    enabled: false
    # Relay endpoint (WebSocket URL).
    # Official relay (free, Cloudflare Workers):
    endpoint: "wss://relay.coordbound.com"
    # Or deploy your own: see relay/ directory and relay/wrangler.toml
    # endpoint: "wss://your-own-relay.example.com"

# ---------------------------------------------------------------------------
# Security hardening (set as environment variables, not config keys)
# ---------------------------------------------------------------------------
#
# ROBOOT_SOUL_REVIEW   -- gates writes to soul.md from update_self /
#                          remember_user / add_note / append_self_feedback.
#                            off     (default) -- writes proceed unreviewed
#                            log               -- writes proceed, diff
#                                                 audited to .soul/pending/
#                            confirm           -- modal on every connected
#                                                 console (local + relay
#                                                 mobile); diffs >2 KB or
#                                                 30 s timeout = REJECTED
#
# ROBOOT_TOOL_APPROVAL -- gates `run_command` shell calls before Arcana
#                          dispatches them. Same shape as ROBOOT_SOUL_REVIEW
#                          but for the action path.
#                            off     (default) -- bypass entirely
#                            log               -- dangerous calls allowed,
#                                                 recorded to .tool_audit/
#                            confirm           -- approval modal on local
#                                                 console + relay mobile +
#                                                 Telegram inline keyboard
#
# Both gates default to `off` for backwards compatibility. If your daemon
# routinely accepts input from untrusted surfaces (Telegram, paired remote
# clients, session_watcher reading sessions you don't fully control), the
# hardening recommendation in SECURITY.md is `log` to build an audit trail
# without modals, or `confirm` for active approval.
#
# Other env vars worth knowing:
#   ROBOOT_AUTO_UPGRADE=1                -- enable hourly self-upgrade loop
#                                            (off by default; see SECURITY.md §5)
#   ROBOOT_UPGRADE_REQUIRE_SIGNED_TAG=1  -- only auto-upgrade when origin/main
#                                            points to a `git verify-tag`-clean
#                                            v* tag
#   ROBOOT_CHAT_RETENTION_DAYS=30        -- chat-history auto-purge cutoff
#                                            (default 30; runs on every
#                                             create_session)
#   ROBOOT_WHISPER_MODEL                 -- override voice.stt.model ad-hoc
#   ROBOOT_WHISPER_LANGUAGE              -- override voice.stt.language ad-hoc
